name: "Testbench: Generate TB from RTL"
description: "Generate or improve a testbench based on your attached RTL"
title: "[TB] "
labels: ["testbench", "help wanted"]

body:
  - type: markdown
    attributes:
      value: |
        ### How to use this template

        1. Attach the Verilog/SystemVerilog **RTL file(s)** for the design you want to test.
        2. If GitHub does not accept `.v` / `.sv` files, compress them into a `.zip` or push them to this repo and reference their paths.
        3. Optionally attach any **existing testbench** you want improved.
        4. Describe what the testbench should verify and any important clock/reset or corner-case requirements.
        5. Copilot/agents will read your attachments and create/update a deterministic, self-checking testbench module (typically `<module>_tb`) under the appropriate workspace (by default `results/issue-<number>/tb/`, or top-level `tb/` when the intent is to add a reusable testbench to the main repo).
        6. For detailed expectations on testbenches, see `.github/instructions/TB.md`.
        7. For how Copilot/agents should behave in this repo, see `.github/copilot-instructions.md`.
        8. As part of the answer, Copilot/agents should also explain what **behaviors and corner cases** the generated testbench covers and mention any obvious coverage gaps.
        9. Copilot/agents must **run the testbench**, keep all build artifacts under `results/issue-<number>/build/`, and generate/update a `results/issue-<number>/REPORT.md` summarizing the testbenches, their coverage, and the pass/fail results.
        10. For the `REPORT.md` structure expected for Testbench issues, see `.github/instructions/REPORT.md`.

  - type: textarea
    id: files
    attributes:
      label: "Attached RTL / existing TB files"
      description: "Attach the RTL for the DUT and any existing testbench. If GitHub shows “File type .v not supported”, either (a) compress them into a .zip and attach that, or (b) push them to this repo and list the paths (e.g. rtl/foo.v, tb/foo_tb.sv)."
      value: |
        For Copilot/agents:

        - Use any attached RTL/testbench files (.v/.sv or .zip) and/or the repo paths listed in this field as the single source of truth.
        - If direct .v/.sv uploads failed with “File type .v not supported”, assume the user either attached a .zip or provided in-repo paths and read those files instead.
        - Create or update deterministic, self-checking testbenches under `results/issue-<number>/tb/` by default, following `.github/instructions/TB.md`.
          - If the intent is to land a reusable testbench in the main repo, it is also acceptable to place it under top-level `tb/` (but still keep per-issue build artifacts and `REPORT.md` under `results/issue-<number>/`).
        - Add concise comments in the testbench to clarify non-obvious stimulus, protocol assumptions, and important corner cases, keeping them consistent with the RTL and any docs.
        - Compile and run the testbench with Icarus Verilog, writing all build artifacts (e.g. `.out` binaries, `.vcd` waveforms, and `compile.log` / `sim.log`) under `results/issue-<number>/build/` without deleting previous files for that issue.
        - Create or update `results/issue-<number>/REPORT.md` following `.github/instructions/REPORT.md`, with:
          - a list of generated/improved testbenches and their DUTs,
          - the exact compile/run commands used and where logs/VCDs were written,
          - a summary of which behaviors and corner cases are covered,
          - any known coverage gaps or limitations,
          - the overall pass/fail status for each testbench.
        - In your explanation back to the user, summarize which behaviors and corner cases are covered by the testbench and highlight any significant coverage gaps or untested scenarios, keeping it consistent with `REPORT.md`.
        - Follow the general behavior rules in `.github/copilot-instructions.md`.
    validations:
      required: true

